version: "1.0.0"
title: "Feature Design Session (Phase 3)"
description: "Phase 3 — Feature Design. Analyses the Feature issue, decomposes it into ordered Task sub-issues, creates the feature branch, and triggers the Dev Session."

parameters:
  - key: issue_number
    input_type: string
    requirement: required
    description: "Feature issue number in the domain repository"
  - key: repository
    input_type: string
    requirement: required
    description: "Domain repository in owner/repo format (e.g. NewOpenBSS/charging-domain)"
  - key: workspace
    input_type: string
    requirement: required
    description: "Absolute path to the domain repo checkout"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 100

instructions: |
  You are running a Feature Design session — Phase 3 of the agentic development process.
  Your job is to decompose a Feature issue into ordered Task sub-issues and create
  the feature branch. The Dev Session will process the tasks to implement the Feature.

  This session is non-interactive. Work through the steps below and exit cleanly.

  ## Step 1 — Read Context

  Read the agent protocol:
    cat agentic/AGENTS.md

  Read the relevant standards file for this domain:
    cat agentic/standards/go.md     (or java.md depending on the domain)

  Read the Feature issue in full:
    gh issue view {{ issue_number }} \
      --repo {{ repository }} \
      --json number,title,body,labels,subIssues

  Read the parent Requirement issue for broader context.
  The Requirement issue number is in the Feature body under "Requirement:".
  Extract the agentic repo and issue number, then:
    gh issue view <requirement-number> \
      --repo <agentic-repo> \
      --json number,title,body

  ## Step 2 — Check for Existing Tasks

  Query existing Task sub-issues on this Feature:
    gh api graphql -f query='
      query($owner: String!, $repo: String!, $number: Int!) {
        repository(owner: $owner, name: $repo) {
          issue(number: $number) {
            subIssues(first: 20) {
              nodes {
                number title state
                labels(first: 3) { nodes { name } }
              }
            }
          }
        }
      }' \
      -f owner=<org> -f repo=<repo-name> -F number={{ issue_number }}

  If open Task sub-issues already exist — the design was already done.
  Check if in-development label is already applied. If so, exit cleanly:
    echo "Tasks already exist and Feature is in-development. Nothing to do."
    exit 0

  ## Step 3 — Check Implementation Approval

  Read the "Implementation Approval" field from the Feature issue body.
  If "Required":
    - Present your proposed task breakdown to the human
    - Wait for confirmation before proceeding
  If "Not required":
    - Proceed automatically

  ## Step 4 — Analyse the Codebase

  The domain repo is checked out at: {{ workspace }}

  Navigate the codebase to understand:
  - What already exists that is relevant to this Feature
  - What needs to be built from scratch
  - Where new code should live (packages, files)
  - What the correct implementation sequence is
  - Any risks or dependencies between tasks

  Read relevant source files. Do not guess — look at the actual code.

  ## Step 5 — Decompose into Tasks

  Determine the minimum number of tasks needed and their correct sequence.
  Each task must be:
  - The smallest atomic unit that can be built, tested, and committed independently
  - Sequenced so each builds on working code from the previous task
  - Described with enough detail for the Dev Session to implement without ambiguity

  ## Step 6 — Create Task Sub-Issues

  Ensure the `task` label exists in the domain repo. If not, create it:
    gh label create "task" \
      --repo {{ repository }} \
      --color "E99695" \
      --description "Implementation task — sub-issue of a feature"

  For each task, create a GitHub Issue in the domain repo:
    gh issue create \
      --repo {{ repository }} \
      --title "Task <N>: <short description>" \
      --label "task" \
      --body "$(cat <<EOF
  **Feature:** #{{ issue_number }}
  **Sequence:** Task N of <total>

  ## Objective
  [What this specific task builds — one or two sentences]

  ## Scope
  **In scope:** [what this task delivers]
  **Out of scope:** [what is deferred to later tasks]

  ## Context
  [Relevant existing code — file paths, function names, patterns to follow]

  ## Acceptance Criteria
  - [ ] [outcome criterion]
  - [ ] [outcome criterion]

  ## Risk
  [Any risks to existing behaviour or critical logic — or "None"]
  EOF
  )"

  After creating each Task issue, immediately wire it as a sub-issue of the Feature:
    FEATURE_NODE_ID=$(gh api /repos/{{ repository }}/issues/{{ issue_number }} --jq '.node_id')
    TASK_NODE_ID=$(gh api /repos/{{ repository }}/issues/<task-number> --jq '.node_id')

    gh api graphql -f query="
      mutation {
        addSubIssue(input: {
          issueId: \"$FEATURE_NODE_ID\"
          subIssueId: \"$TASK_NODE_ID\"
        }) {
          issue { number }
          subIssue { number }
        }
      }"

  ## Step 7 — Create the Feature Branch

  Derive the branch name from the Feature issue number and title.
  Slugify the title: lowercase, spaces to hyphens, remove special characters.
  Branch name format: feature/<issue-number>-<slugified-title>
  Example: feature/1-permission-enforcement-framework

  Get the main branch SHA and the repo node ID, then create via GitHub API:
    REPO_NODE_ID=$(gh api /repos/{{ repository }} --jq '.node_id')
    FEATURE_NODE_ID=$(gh api /repos/{{ repository }}/issues/{{ issue_number }} --jq '.node_id')
    MAIN_SHA=$(gh api /repos/{{ repository }}/branches/main --jq '.commit.sha')

    gh api graphql -f query="
      mutation {
        createLinkedBranch(input: {
          issueId: \"$FEATURE_NODE_ID\"
          repositoryId: \"$REPO_NODE_ID\"
          name: \"feature/{{ issue_number }}-<slugified-title>\"
          oid: \"$MAIN_SHA\"
        }) {
          linkedBranch {
            ref { name }
          }
        }
      }"

  This creates the branch on GitHub AND links it to the Feature issue in one step.
  No local git push is needed.

  ## Step 8 — Trigger the Dev Session

  Apply the `in-development` label on the Feature issue.
  This triggers the Dev Session workflow automatically.

    gh issue edit {{ issue_number }} \
      --repo {{ repository }} \
      --remove-label "in-design" \
      --add-label "in-development"

  ## Step 9 — Report and Exit

  List the Task issues created with issue numbers, URLs, and one-line descriptions.
  State the branch name created.
  Confirm: "Feature #{{ issue_number }} decomposed into <N> tasks.
  Branch feature/<N>-<name> created. Dev Session will start automatically."

  Exit cleanly. Do not push files. Do not open a PR.
  The workflow has nothing further to do after this recipe exits.

prompt: |
  Starting Feature Design session for issue #{{ issue_number }} in {{ repository }}.
  Reading context, analysing codebase, and decomposing into tasks.
