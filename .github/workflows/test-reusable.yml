name: Test Reusable Structured
on:
  workflow_call:
    inputs:
      issue_number:
        description: 'Feature issue number'
        required: true
        type: string
      repository:
        description: 'Domain repository'
        required: true
        type: string
    secrets:
      GOOSE_AGENT_PAT:
        required: true
jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
    steps:
      - run: echo "issue=${{ inputs.issue_number }} repo=${{ inputs.repository }}"
